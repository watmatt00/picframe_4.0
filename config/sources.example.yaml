# PicFrame 4.0 Photo Sources Example
# Copy to ~/.picframe/sources.yaml and customize

sources:
  # Main photos from Koofr cloud
  - id: "koofr_main"
    name: "Main Photos"
    local_path: "/home/pi/Pictures/koofr_main"
    rclone_remote: "koofr:PicFrame"
    enabled: true

  # Example: Google Drive source
  # - id: "gdrive_family"
  #   name: "Family Photos"
  #   local_path: "/home/pi/Pictures/gdrive_family"
  #   rclone_remote: "gdrive:Family Photos"
  #   enabled: false

  # Example: Local-only folder (no cloud sync)
  # - id: "local_favorites"
  #   name: "Favorites"
  #   local_path: "/home/pi/Pictures/favorites"
  #   rclone_remote: null
  #   enabled: true
