{% extends "base.html" %}

{% block title %}Settings - PicFrame{% endblock %}

{% block content %}
<h1>Settings</h1>

<form action="/settings" method="post" class="settings-form">
    <section class="card">
        <h3>Frame</h3>
        <div class="form-group">
            <label for="frame-id">Frame ID</label>
            <input type="text" id="frame-id" name="frame_id" value="{{ config.get('frame', {}).get('id', '') }}" readonly>
            <small>Unique identifier (read-only)</small>
        </div>
        <div class="form-group">
            <label for="frame-name">Frame Name</label>
            <input type="text" id="frame-name" name="frame_name" value="{{ config.get('frame', {}).get('name', 'PicFrame') }}">
        </div>
    </section>

    <section class="card">
        <h3>Display</h3>
        <div class="form-group">
            <label for="rotation-interval">Rotation Interval (seconds)</label>
            <input type="number" id="rotation-interval" name="rotation_interval"
                   value="{{ config.get('display', {}).get('rotation_interval', 30) }}"
                   min="5" max="3600">
        </div>
    </section>

    <section class="card">
        <h3>Sync</h3>
        <div class="form-group">
            <label for="sync-interval">Sync Interval (seconds)</label>
            <input type="number" id="sync-interval" name="sync_interval"
                   value="{{ config.get('sync', {}).get('interval', 900) }}"
                   min="60" max="86400">
            <small>How often to check for new photos (60-86400)</small>
        </div>
    </section>

    <section class="card">
        <h3>Logging</h3>
        <div class="form-group">
            <label for="log-level">Log Level</label>
            <select id="log-level" name="log_level">
                <option value="DEBUG" {{ 'selected' if config.get('logging', {}).get('level') == 'DEBUG' }}>DEBUG</option>
                <option value="INFO" {{ 'selected' if config.get('logging', {}).get('level', 'INFO') == 'INFO' }}>INFO</option>
                <option value="WARNING" {{ 'selected' if config.get('logging', {}).get('level') == 'WARNING' }}>WARNING</option>
                <option value="ERROR" {{ 'selected' if config.get('logging', {}).get('level') == 'ERROR' }}>ERROR</option>
            </select>
        </div>
    </section>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Settings</button>
        <button type="reset" class="btn">Reset</button>
    </div>
</form>
{% endblock %}
