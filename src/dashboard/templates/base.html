<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PicFrame{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">PicFrame</a>
        </div>
        <ul class="nav-links">
            <li><a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Status</a></li>
            <li><a href="/settings" {% if request.url.path == "/settings" %}class="active"{% endif %}>Settings</a></li>
            <li><a href="/devices" {% if request.url.path == "/devices" %}class="active"{% endif %}>Devices</a></li>
            <li><a href="/pairing" {% if request.url.path == "/pairing" %}class="active"{% endif %}>Pairing</a></li>
            <li><a href="/logs" {% if request.url.path == "/logs" %}class="active"{% endif %}>Logs</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>PicFrame 4.0 &bull; <span id="current-time"></span></p>
    </footer>

    <script src="/static/js/dashboard.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
