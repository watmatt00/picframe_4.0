{% extends "base.html" %}

{% block title %}Logs - PicFrame{% endblock %}

{% block content %}
<h1>Logs</h1>

<section class="card">
    <div class="log-controls">
        <select id="log-type" onchange="loadLogs()">
            <option value="ops">Operations Log</option>
            <option value="security">Security Log</option>
        </select>
        <select id="log-lines" onchange="loadLogs()">
            <option value="50">Last 50 lines</option>
            <option value="100" selected>Last 100 lines</option>
            <option value="500">Last 500 lines</option>
        </select>
        <button class="btn" onclick="loadLogs()">Refresh</button>
        <label class="auto-refresh">
            <input type="checkbox" id="auto-refresh" onchange="toggleAutoRefresh()">
            Auto-refresh
        </label>
    </div>

    <pre class="log-viewer" id="log-content">Loading...</pre>
</section>
{% endblock %}

{% block scripts %}
<script>
let autoRefreshInterval;

async function loadLogs() {
    const logType = document.getElementById('log-type').value;
    const lines = document.getElementById('log-lines').value;
    const content = document.getElementById('log-content');

    try {
        const response = await fetch(`/api/logs?log_type=${logType}&lines=${lines}`);
        const data = await response.json();

        if (data.logs && data.logs.length > 0) {
            content.textContent = data.logs.join('\n');
        } else {
            content.textContent = 'No log entries found.';
        }

        // Scroll to bottom
        content.scrollTop = content.scrollHeight;
    } catch (err) {
        content.textContent = 'Failed to load logs: ' + err.message;
    }
}

function toggleAutoRefresh() {
    const enabled = document.getElementById('auto-refresh').checked;

    if (enabled) {
        autoRefreshInterval = setInterval(loadLogs, 5000);
    } else {
        clearInterval(autoRefreshInterval);
    }
}

document.addEventListener('DOMContentLoaded', loadLogs);
</script>
{% endblock %}
